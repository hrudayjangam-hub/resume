<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Editor - ResumeAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=7">
</head>
<body>
  <nav class="navbar"></nav>
  <div class="editor-page">
    <div class="editor-sidebar no-print" id="editorSidebar">
      <div class="editor-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <button class="btn btn-ghost btn-sm mobile-only" onclick="toggleEditorSidebar()" style="font-size:16px" id="editorToggleBtn">🔼 Hide</button>
        <input class="form-input" id="resumeTitle" placeholder="Resume Title" style="font-weight:600;font-size:15px;flex:1;margin-right:8px">
        <span id="saveIndicator" style="font-size:12px;font-weight:500;color:var(--success);min-width:100px;text-align:right"></span>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn btn-primary btn-sm" id="saveBtn" style="flex:1">💾 Save</button>
        <button class="btn btn-secondary btn-sm" id="downloadPdfBtn" style="flex:1">📄 PDF</button>
      </div>
      <div class="ats-score-ring" id="atsScoreRing" style="margin-bottom:16px;width:100%">
        <svg viewBox="0 0 40 40">
          <circle class="ring-bg" cx="20" cy="20" r="18"/>
          <circle class="ring-fg" id="atsRingFg" cx="20" cy="20" r="18"/>
        </svg>
        <div>
          <span class="ring-score" id="atsScoreValue">--</span>
          <span class="ring-label">ATS Score</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="openAIPanel('generateResume')" style="flex:1;min-width:120px">🚀 Auto Resume</button>
        <button class="btn btn-ghost btn-sm" onclick="getSuggestions()" style="color:var(--success)">✅ Suggestions</button>
        <button class="btn btn-ghost btn-sm" onclick="openAIPanel('summary')">🤖 Summary</button>
        <button class="btn btn-ghost btn-sm" onclick="openAIPanel('improve')">✨ Improve</button>
        <button class="btn btn-ghost btn-sm" onclick="openAIPanel('skills')">💡 Skills</button>
        <button class="btn btn-ghost btn-sm" onclick="openAIPanel('coverLetter')">📝 Cover Letter</button>
        <button class="btn btn-ghost btn-sm" onclick="openAIPanel('tailor')">🎯 Job Match</button>
        <button class="btn btn-ghost btn-sm" onclick="openAIPanel('rewrite')">✍️ Rewrite</button>
        <button class="btn btn-ghost btn-sm" onclick="openAIPanel('bulletPoints')">🔫 Bullets</button>
      </div>

      <div class="section-tabs">
        <button class="section-tab active" data-section="personalInfo">Personal</button>
        <button class="section-tab" data-section="educationSection">Education</button>
        <button class="section-tab" data-section="experienceSection">Experience</button>
        <button class="section-tab" data-section="skillsSection">Skills</button>
        <button class="section-tab" data-section="certificationsSection">Certs</button>
        <button class="section-tab" data-section="achievementsSection">Achievements</button>
        <button class="section-tab" data-section="projectsSection">Projects</button>
      </div>

      <div class="section-content active" id="personalInfo">
        <h3>Personal Information</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group"><label>Full Name</label><input class="form-input" id="fullName" placeholder="John Doe"></div>
          <div class="form-group"><label>Professional Title</label><input class="form-input" id="professionalTitle" placeholder="Software Engineer"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group"><label>Email</label><input type="email" class="form-input" id="email" placeholder="john@example.com"></div>
          <div class="form-group"><label>Phone</label><input class="form-input" id="phone" placeholder="+1 234 567 890"></div>
        </div>
        <div class="form-group"><label>Location</label><input class="form-input" id="location" placeholder="San Francisco, CA"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group"><label>LinkedIn</label><input class="form-input" id="linkedin" placeholder="linkedin.com/in/johndoe"></div>
          <div class="form-group"><label>GitHub</label><input class="form-input" id="github" placeholder="github.com/johndoe"></div>
          <div class="form-group"><label>Portfolio</label><input class="form-input" id="portfolio" placeholder="johndoe.com"></div>
        </div>
          <div class="form-group"><label>Professional Summary</label><textarea class="form-textarea auto-resize" id="summary" rows="4" placeholder="Write a brief professional summary..."></textarea></div>
        <div class="form-group"><label>Template</label><select class="form-select" id="templateSelect">
          <option value="modern">Modern</option>
          <option value="minimal">Minimal</option>
          <option value="corporate">Corporate</option>
          <option value="creative">Creative</option>
          <option value="ats">ATS Optimized</option>
        </select></div>
        <div class="form-group"><label>Accent Color</label><input type="color" class="form-input" id="primaryColor" value="#2563eb" style="height:40px;padding:4px;cursor:pointer"></div>
      </div>

      <div class="section-content" id="educationSection">
        <h3>Education</h3>
        <div id="educationList"></div>
        <button class="add-btn" onclick="addItem('education')">+ Add Education</button>
      </div>

      <div class="section-content" id="experienceSection">
        <h3>Experience</h3>
        <div id="experienceList"></div>
        <button class="add-btn" onclick="addItem('experience')">+ Add Experience</button>
      </div>

      <div class="section-content" id="skillsSection">
        <h3>Skills</h3>
        <div id="skillsList"></div>
        <button class="add-btn" onclick="addItem('skills')">+ Add Skill</button>
      </div>

      <div class="section-content" id="certificationsSection">
        <h3>Certifications</h3>
        <div id="certificationsList"></div>
        <button class="add-btn" onclick="addItem('certifications')">+ Add Certification</button>
      </div>

      <div class="section-content" id="achievementsSection">
        <h3>Achievements</h3>
        <div id="achievementsList"></div>
        <button class="add-btn" onclick="addItem('achievements')">+ Add Achievement</button>
      </div>

      <div class="section-content" id="projectsSection">
        <h3>Projects</h3>
        <div id="projectsList"></div>
        <button class="add-btn" onclick="addItem('projects')">+ Add Project</button>
      </div>
    </div>

    <div class="editor-preview" id="editorPreview">
      <div class="resume-preview" id="resumePreview">
        <div style="text-align:center;padding:60px 20px;color:var(--text-muted)">
          <div style="font-size:48px;margin-bottom:16px">📄</div>
          <p>Loading resume preview...</p>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="aiModal">
    <div class="modal scale-in">
      <h2 id="aiModalTitle">AI Assistant</h2>
      <div id="aiModalBody"></div>
      <div style="margin-top:16px;text-align:right">
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script src="/js/translations.js"></script>
  <script src="/js/auth.js?v=3"></script>
  <script src="/js/ai-assistant.js"></script>
  <script src="/js/ui-enhancements.js"></script>
  <script src="/js/editor.js?v=3"></script>
</body>
</html>
