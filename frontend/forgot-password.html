<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ResumeAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=7">
</head>
<body>
  <nav class="navbar"></nav>
  <div class="auth-page">
    <div class="auth-container fade-in">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo-icon">🔑</div>
          <h1>Forgot Password</h1>
          <p>Enter your email to reset your password</p>
        </div>
        <div id="errorAlert" class="alert alert-error"></div>
        <div id="successAlert" class="alert alert-success"></div>
        <form id="forgotForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Send Reset Link</button>
        </form>
        <div class="auth-footer">
          <a href="/login.html">Back to sign in</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/api.js?v=3"></script>
  <script src="/js/translations.js"></script>
  <script src="/js/auth.js?v=3"></script>
  <script src="/js/ai-assistant.js"></script>
  <script src="/js/ui-enhancements.js"></script>
  <script src="/js/page-forgot-password.js"></script>
</body>
</html>
