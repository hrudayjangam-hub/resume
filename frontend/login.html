<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - ResumeAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=7">
</head>
<body>
  <nav class="navbar"></nav>
  <div class="auth-page">
    <div class="auth-container fade-in">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo-icon">📄</div>
          <h1 data-i18n="auth.login.title">Welcome Back</h1>
          <p data-i18n="auth.login.subtitle">Sign in to continue building your resume</p>
        </div>
        <div id="errorAlert" class="alert alert-error"></div>
        <form id="loginForm">
          <div class="form-group">
            <label data-i18n="auth.email">Email</label>
            <input type="email" class="form-input" id="email" data-i18n-placeholder="auth.email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label data-i18n="auth.password">Password</label>
            <input type="password" class="form-input" id="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" data-i18n="auth.login.btn">Sign In</button>
        </form>
        <div class="auth-footer">
          <a href="/forgot-password.html" data-i18n="auth.forgot">Forgot password?</a>
          <br><br>
          <span data-i18n="auth.noAccount">Don't have an account?</span> <a href="/register.html">Sign up</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/api.js?v=3"></script>
  <script src="/js/translations.js"></script>
  <script src="/js/auth.js?v=3"></script>
  <script src="/js/ai-assistant.js"></script>
  <script src="/js/ui-enhancements.js"></script>
  <script src="/js/page-login.js"></script>
</body>
</html>
