<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - ResumeAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=3">
</head>
<body>
  <nav class="navbar"></nav>
  <div class="auth-page">
    <div class="auth-container fade-in">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo-icon">🚀</div>
          <h1>Get Started</h1>
          <p>Create your free account</p>
        </div>
        <div id="errorAlert" class="alert alert-error"></div>
        <form id="registerForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-input" id="name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-input" id="password" placeholder="At least 6 characters" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
        </form>
        <div class="auth-footer">
          Already have an account? <a href="/login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/api.js?v=3"></script>
  <script src="/js/auth.js?v=3"></script>
  <script src="/js/page-register.js"></script>
</body>
</html>
