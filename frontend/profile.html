<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - ResumeAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=3">
</head>
<body>
  <nav class="navbar"></nav>
  <div class="dashboard">
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:0 16px 8px" class="mobile-only-close">
        <span style="font-weight:700;font-size:15px">Menu</span>
        <button class="btn btn-ghost btn-sm" onclick="toggleSidebar()" style="font-size:18px">✕</button>
      </div>
      <div class="user-info">
        <div class="avatar" id="profileInitials">JD</div>
        <div class="name" id="profileName">User</div>
        <div class="email" id="profileEmail">user@email.com</div>
      </div>
      <button class="nav-item" onclick="window.location.href='/dashboard.html'"><span class="icon">📊</span> Dashboard</button>
      <button class="nav-item" onclick="window.location.href='/editor.html'"><span class="icon">✏️</span> Resume Editor</button>
      <button class="nav-item" onclick="window.location.href='/templates.html'"><span class="icon">🎨</span> Templates</button>
      <button class="nav-item active" onclick="window.location.href='/profile.html'"><span class="icon">👤</span> Profile</button>
      <button class="nav-item" onclick="logout()" style="margin-top:auto"><span class="icon">🚪</span> Logout</button>
    </aside>

    <main class="main-content">
      <div class="page-header"><div><h1>Profile</h1><p>Manage your account settings</p></div></div>

      <div class="card" style="margin-bottom:24px">
        <div class="profile-header">
          <div class="profile-avatar" id="profileAvatar">JD</div>
          <div><h2 id="displayName" style="font-size:22px;font-weight:700">User</h2>
          <p id="displayEmail" style="color:var(--text-secondary)">user@email.com</p>
          <p id="memberSince" style="font-size:12px;color:var(--text-muted);margin-top:4px"></p></div>
        </div>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card"><div class="stat-icon" style="background:var(--primary-light);color:var(--primary)">📄</div>
          <div class="stat-value" id="totalResumesCount">0</div>
          <div class="stat-label">Resumes</div>
        </div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(16,185,129,0.1);color:#10b981">🤖</div>
          <div class="stat-value">AI</div>
          <div class="stat-label">AI Credits</div>
        </div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(245,158,11,0.1);color:#f59e0b">☁️</div>
          <div class="stat-value">Cloud</div>
          <div class="stat-label">Auto-Saved</div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script src="/js/translations.js"></script>
  <script src="/js/auth.js?v=3"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
