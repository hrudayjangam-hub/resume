<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ResumeAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=4">
</head>
<body>
  <nav class="navbar"></nav>
  <div class="dashboard">
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:0 16px 8px" class="mobile-only-close">
        <span style="font-weight:700;font-size:15px">Menu</span>
        <button class="btn btn-ghost btn-sm" onclick="toggleSidebar()" style="font-size:18px">✕</button>
      </div>
      <div class="user-info">
        <div class="avatar" id="userInitials">JD</div>
        <div class="name" id="userName">User</div>
        <div class="email" id="userEmail">user@email.com</div>
      </div>
      <button class="nav-item active" onclick="window.location.href='/dashboard.html'"><span class="icon">📊</span> Dashboard</button>
      <button class="nav-item" onclick="window.location.href='/editor.html'"><span class="icon">✏️</span> Resume Editor</button>
      <button class="nav-item" onclick="window.location.href='/templates.html'"><span class="icon">🎨</span> Templates</button>
      <button class="nav-item" onclick="window.location.href='/profile.html'"><span class="icon">👤</span> Profile</button>
      <button class="nav-item" onclick="logout()" style="margin-top:auto"><span class="icon">🚪</span> Logout</button>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Dashboard</h1>
          <p>Manage your resumes and track progress</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="openAIPanel('generateResume')">🚀 AI Generate</button>
          <button class="btn btn-secondary" onclick="createNewResume()">+ New Resume</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--primary-light);color:var(--primary)">📄</div>
          <div class="stat-value" id="totalResumes">0</div>
          <div class="stat-label">Total Resumes</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(16,185,129,0.1);color:#10b981">⏰</div>
          <div class="stat-value" id="recentEdits">0</div>
          <div class="stat-label">Edited This Week</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(245,158,11,0.1);color:#f59e0b">🎯</div>
          <div class="stat-value">ATS</div>
          <div class="stat-label">Optimized Templates</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(139,92,246,0.1);color:#8b5cf6">⚡</div>
          <div class="stat-value">AI</div>
          <div class="stat-label">Smart Assistance</div>
        </div>
      </div>

      <div id="emptyState" class="empty-state" style="display:none">
        <div class="empty-icon">📄</div>
        <h3>No resumes yet</h3>
        <p>Create your first AI-powered resume to get started</p>
        <button class="btn btn-primary btn-lg" onclick="createNewResume()">Create Your First Resume</button>
      </div>

      <div class="resume-grid" id="resumeGrid"></div>
    </main>
  </div>

  <div class="modal-overlay" id="newResumeModal">
    <div class="modal scale-in">
      <h2>Create New Resume</h2>
      <div class="form-group">
        <label>Resume Title</label>
        <input class="form-input" id="resumeTitle" placeholder="e.g. Frontend Developer Resume">
      </div>
      <div class="form-group">
        <label>Template</label>
        <select class="form-select" id="resumeTemplate">
          <option value="modern">Modern</option>
          <option value="minimal">Minimal</option>
          <option value="corporate">Corporate</option>
          <option value="creative">Creative</option>
          <option value="ats">ATS Optimized</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:24px">
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" style="flex:1" onclick="createResume()">Create</button>
          <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
        </div>
        <button class="btn btn-outline" onclick="openAIPanel('generateResume')" style="color:var(--primary);border-color:var(--primary)">🚀 Or Generate with AI</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script src="/js/translations.js"></script>
  <script src="/js/auth.js?v=3"></script>
  <script src="/js/ai-assistant.js"></script>
  <script src="/js/dashboard.js?v=3"></script>
</body>
</html>
